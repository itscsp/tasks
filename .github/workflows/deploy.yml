name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Build NestJS ──────────────────────────────────────────────
      - name: Install backend dependencies
        run: npm install

      - name: Build NestJS
        run: npm run build

      # ── Build Angular ─────────────────────────────────────────────
      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build Angular
        run: cd frontend && npm run build

      # ── Deploy built files to Hostinger via rsync ─────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload built files to server
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/src' \
            --exclude='.git' \
            --exclude='.env' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_rsa" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/nodejs/

      # ── Install prod deps & restart on server ─────────────────────
      - name: Install production deps & restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd ~/nodejs
            npm install --omit=dev
            pm2 restart tasks-api || pm2 start dist/main.js --name tasks-api
            pm2 save
