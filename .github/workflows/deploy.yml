name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm install

      - name: Build NestJS
        run: npm run build

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build Angular
        run: cd frontend && npm run build

      # ── Trigger deployment webhook on the live server ─────────────
      # The server pulls from GitHub and restarts itself
      - name: Trigger deploy webhook
        run: |
          curl -f -X POST https://tasks.drcart.in/api/v1/deploy \
            -H "x-deploy-token: ${{ secrets.DEPLOY_SECRET }}" \
            --max-time 300 \
            --retry 2 \
            --retry-delay 5
