name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Project
        run: bun run build
        env:
          VITE_WP_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 157.173.216.12
          username: u392192436.chethanspoojary
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /tasks/
          dangerous-clean-slate: false